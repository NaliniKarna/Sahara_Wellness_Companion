kind = "web"
previewPath = "/"
title = "Sahara — AI Career & Wellness Companion"
version = "1.0.0"
id = "artifacts/sahara"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26242

[services.development]
run = "pnpm --filter @workspace/sahara run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sahara", "run", "build" ]
publicDir = "artifacts/sahara/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26242"
BASE_PATH = "/"
