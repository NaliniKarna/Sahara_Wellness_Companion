packages:
  "framer-motion": "For page transitions, smooth onboarding wizard animations, and interactive micro-interactions."
  "recharts": "For rendering career progress charts, probability gauges, and mood history line charts."
  "canvas-confetti": "For celebration effects when completing tasks and the onboarding wizard."
  "@types/canvas-confetti": "Types for canvas-confetti."
  "date-fns": "For formatting dates in the weekly plan and reality simulator."
  "clsx": "Utility for constructing className strings conditionally."
  "tailwind-merge": "Utility for merging tailwind classes safely."

images:
  - path: "artifacts/sahara/public/images/hero-bg.png"
    description: "Abstract soft light blue and white gradient mesh background, calm, serene, conveying clarity and focus"
    aspect_ratio: "16:9"
  - path: "artifacts/sahara/public/images/meditation.png"
    description: "Minimalist modern 3D illustration of a person sitting in a calm zen pose, surrounded by floating soft UI elements and career paths, light blue tones"
    aspect_ratio: "1:1"
  - path: "artifacts/sahara/public/images/career-path.png"
    description: "Minimalist modern 3D illustration of a winding pathway leading to a glowing star or goal, soft blue and white colors, representing career clarity"
    aspect_ratio: "16:9"

notes:
  - Auth is handled via a random session ID stored in localStorage and passed in the X-Session-Id header.
  - The API uses the OpenAPI generated hooks from @workspace/api-client-react.
  - Custom headers are passed via the `request` property in the options object of each hook.
